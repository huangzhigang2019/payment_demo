# Root project information
sonar.projectKey=PAX_EMV_DEMO_A_2.0
sonar.projectName=PAX_EMV_DEMO_A_2.0
sonar.projectVersion=1.00.00
sonar.modules=app,emv,sdk,commonlib

# Some properties that will be inherited by the modules
#app
app.sonar.sources=src/main/java
#app.sonar.tests=app/src/test/java
app.sonar.java.binaries=build/intermediates/javac/debug/compileDebugJavaWithJavac/classes
app.sonar.language=java

#emv
emv.sonar.sources=src/main/java
emv.sonar.java.binaries=build/intermediates/javac/debug/compileDebugJavaWithJavac/classes
emv.sonar.language=java

#sdk
sdk.sonar.sources=src/main/java
sdk.sonar.java.binaries=build/intermediates/javac/debug/compileDebugJavaWithJavac/classes
sdk.sonar.language=java
sonar.exclusions=src/main/java/com/paxsz/module/pos/picc/**/*,src/main/java/com/paxsz/module/pos/icc/**/*,src/main/java/com/paxsz/module/pos/mag/**/*,src/main/java/com/paxsz/module/pos/ped/**/*
#commonlib
commonlib.sonar.sources=src/main/java
#commonlib.sonar.tests=app/src/test/java
commonlib.sonar.java.binaries=build/intermediates/javac/debug/compileDebugJavaWithJavac/classes
commonlib.sonar.language=java
#Tells SonarQube where the unit tests execution reports are
#sonar.junit.reportsPath=app/build/test-results/testDebugUnitTest
#Tells SonarQube where the unit tests code coverage report is
#sonar.jacoco.reportPath=app/build/jacoco/testDebugUnitTest.exec
#Tells SonarQube where the integration tests code coverage report is
#sonar.jacoco.itReportPath=app/reports/jacoco/jacoco-it.exec
# Encoding of the source files
sonar.sourceEncoding=UTF-8